name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  build-and-test:
    name: build & test (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-apple-darwin
            os: macos-15-intel
          - target: x86_64-pc-windows-msvc
            os: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain (pinned by rust-toolchain.toml)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # MSVC's PDB writer can hit its public-symbol limit when linking the
      # property-test binaries. Tests still run normally without debug symbols.
      - name: Reduce Windows debug symbols
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          "CARGO_PROFILE_DEV_DEBUG=0" >> $env:GITHUB_ENV
          "CARGO_PROFILE_TEST_DEBUG=0" >> $env:GITHUB_ENV

      - name: Cache cargo registry and build
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build
        run: cargo build --workspace --all-targets --target ${{ matrix.target }}

      - name: Test
        # The aarch64-apple-darwin slot cross-compiles on an x86_64 macOS
        # runner in some configurations; tests run on native-arch targets.
        run: cargo test --workspace --target ${{ matrix.target }}

  lint:
    name: fmt & clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: rustfmt
        run: cargo fmt --all --check
      - name: clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
