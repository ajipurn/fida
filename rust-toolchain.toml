# Pins the Fida toolchain (MSRV). CI builds and tests all four release
# target triples against this toolchain.
[toolchain]
channel = "1.85.0"
components = ["rustfmt", "clippy"]
targets = [
    "x86_64-unknown-linux-gnu",
    "aarch64-apple-darwin",
    "x86_64-apple-darwin",
    "x86_64-pc-windows-msvc",
]
